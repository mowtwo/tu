name: Deploy docs

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# One in-flight Pages deploy at a time. Don't cancel a running deploy when
# a new push lands — let the previous job finish so the site stays online.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.28.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Package the VS Code extension into a .vsix so the docs site can offer
      # it as a direct download (until vscode-tu lands on the Marketplace).
      # `vsce package` is idempotent; `--no-dependencies` skips re-running
      # workspace cross-deps (we already built them).
      - name: Build packages (so vscode-tu can bundle compiled deps)
        run: pnpm build

      - name: Package VS Code extension
        run: |
          npx --yes @vscode/vsce package --no-dependencies --skip-license -o vscode-tu-latest.vsix
        working-directory: packages/vscode

      - name: Stage install artifacts into docs/public
        run: |
          mkdir -p docs/public/install
          cp packages/vscode/vscode-tu-latest.vsix docs/public/install/
          # Refresh the grammar copy too so it's always in sync.
          mkdir -p docs/public/grammar
          cp packages/vscode/syntaxes/tu.tmLanguage.json docs/public/grammar/

      - name: Build VitePress site
        run: pnpm --filter tu-docs build

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/.vitepress/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
