name: Release

# Triggered by pushing a tag of the form `v0.1.0`, `v0.1.0-alpha.0`, etc.
# The tag name does NOT have to match the version in package.json — the
# workflow uses whatever's currently in the workspace package.json files
# at the tagged commit. (Practical pattern: bump versions, commit, tag,
# push tag.)
#
# AUTH: npm Trusted Publishing (OIDC) — no NPM_TOKEN needed.
# Configure once on npmjs.com: for each `@tu-lang/*` package and `create-tu`,
# go to "Trusted Publishers" and add this workflow:
#   GitHub repo:        mowtwo/tu
#   Workflow filename:  release.yml
#   Environment name:   (leave blank, or "release" if you add one)
# For brand-new packages that don't exist yet, npm supports
# "Pending Publisher" — set the trusted publisher first, then push a tag;
# the first publish creates the package with provenance attached.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write   # for creating the GitHub release entry
  id-token: write   # REQUIRED for OIDC token used by npm Trusted Publishing
                    # and for provenance attestations on the published packages

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.28.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          # Setting registry-url + no NODE_AUTH_TOKEN puts the runner into
          # OIDC mode — npm CLI will request an ID token from GitHub Actions
          # at publish time and exchange it for short-lived publish creds.
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test

      - name: Type-check
        run: pnpm check

      # Pack-then-publish split. Reasons:
      #
      # 1. **OIDC needs npm 11.5.1+**, but the runner ships npm 10.x with
      #    Node 22 and `npm install -g npm@latest` hits a known
      #    promise-retry self-update bug. Using `npx -y npm@11 ...` per
      #    package runs npm 11 in a subprocess that inherits the
      #    ACTIONS_ID_TOKEN_* env vars set by `actions/setup-node` —
      #    OIDC trusted publishing works, no global install needed.
      #
      # 2. **Workspace deps must rewrite** — pnpm pack handles
      #    `workspace:*` → actual version inside the tarball. We pack
      #    each workspace, then npm publishes the tarball.
      #
      # 3. **--provenance** attaches the build attestation surfacing the
      #    green "Built and signed on GitHub Actions" badge on each
      #    package page. Requires id-token: write (declared above).
      - name: Pack workspaces
        run: |
          mkdir -p .release
          for pkg in '@tu-lang/compiler' '@tu-lang/runtime' '@tu-lang/vite' '@tu-lang/lsp' '@tu-lang/cli' '@tu-lang/format' '@tu-lang/std' 'create-tu'; do
            echo "::group::Pack $pkg"
            pnpm --filter "$pkg" pack --pack-destination "$PWD/.release"
            echo "::endgroup::"
          done
          ls -la .release

      - name: Publish to npm (Trusted Publishing + provenance)
        run: |
          # Pick the dist-tag based on the version. Anything containing a
          # hyphen (e.g. 0.1.0-alpha.0) is a prerelease and goes to the
          # `alpha` tag; clean semver goes to `latest`.
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [[ "$TAG_VERSION" == *-* ]]; then
            DIST_TAG="alpha"
          else
            DIST_TAG="latest"
          fi
          echo "Publishing with dist-tag: $DIST_TAG"
          cd .release
          for tarball in *.tgz; do
            echo "::group::Publish $tarball"
            npx -y npm@11 publish "$tarball" \
              --access public \
              --tag "$DIST_TAG" \
              --provenance
            echo "::endgroup::"
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-') }}
