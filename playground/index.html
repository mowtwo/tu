<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tu Playground</title>
    <link rel="stylesheet" href="/src/styles.css" />
  </head>
  <body>
    <!--
      The sidebar and stage header are rendered by Tu components
      (Sidebar.tu / StageHeader.tu) into these mount hosts. The container
      classes (.sidebar, .stage__header) are emitted by the Tu components
      themselves; these <div>s are just empty roots.
    -->
    <div id="sidebar-host"></div>
    <main class="stage">
      <div id="header-host"></div>
      <div class="stage__mount" id="mount"></div>
    </main>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
