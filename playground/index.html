<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tu Playground</title>
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <link rel="stylesheet" href="/src/styles.css" />
  </head>
  <body class="bg-[hsl(var(--tu-bg))] text-[hsl(var(--tu-fg))]">
    <!--
      Sidebar + stage header are rendered by Tu components (Sidebar.tu /
      StageHeader.tu) using @tu-lang/tu-xing primitives. The hosts are
      `display: contents` (see styles.css) so the rendered <aside> /
      <header> participate in the body grid as direct children.
    -->
    <div id="sidebar-host"></div>
    <main class="flex flex-col">
      <div id="header-host"></div>
      <div class="p-8" id="mount"></div>
    </main>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
