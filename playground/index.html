<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tu Playground</title>
    <link rel="stylesheet" href="/src/styles.css" />
  </head>
  <body>
    <aside class="sidebar">
      <h1 class="brand">Tu <span class="brand__cn">图</span></h1>
      <p class="subtitle">Pre-alpha playground</p>
      <nav class="demos" id="demos"></nav>
      <footer class="meta">
        <p>Edit any <code>.tu</code> file under <code>examples/</code> and the page reloads via the <code>@tu/vite</code> plugin.</p>
      </footer>
    </aside>
    <main class="stage">
      <header class="stage__header">
        <h2 id="demo-title"></h2>
        <p id="demo-blurb"></p>
      </header>
      <div class="stage__mount" id="mount"></div>
    </main>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
